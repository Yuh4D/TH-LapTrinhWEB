            <div class="collapse navbar-collapse" id="menu">

    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">Sản phẩm nổi bật</h2>

            <div class="row g-4">

                
                <div class="col-md-4">
                    <div class="card product-card h-100">
                        <img src="https://picsum.photos/400/300?1" class="card-img-top" alt="product">

                        <div class="card-body text-center">
                            <h5 class="card-title">Tai nghe Bluetooth</h5>
                            <p class="card-text">
                                Âm thanh chất lượng cao, pin lâu.
                            </p>

                            <h4 class="text-danger">599.000đ</h4>

                            <button class="btn btn-primary">
                                Thêm vào giỏ
                            </button>
                        </div>
                    </div>
                </div>

                
                <div class="col-md-4">
                    <div class="card product-card h-100">
                        <img src="https://picsum.photos/400/300?2" class="card-img-top" alt="product">

                        <div class="card-body text-center">
                            <h5 class="card-title">Bàn phím cơ</h5>

                            <p class="card-text">
                                Thiết kế gaming hiện đại.
                            </p>

                            <h4 class="text-danger">1.200.000đ</h4>

                            <button class="btn btn-primary">
                                Thêm vào giỏ
                            </button>
                        </div>
                    </div>
                </div>

                
                <div class="col-md-4">
                    <div class="card product-card h-100">
                        <img src="https://picsum.photos/400/300?3" class="card-img-top" alt="product">

                        <div class="card-body text-center">
                            <h5 class="card-title">Chuột Gaming</h5>

                            <p class="card-text">
                                DPI cao, cảm giác cầm thoải mái.
                            </p>

                            <h4 class="text-danger">450.000đ</h4>

                            <button class="btn btn-primary">
                                Thêm vào giỏ
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">
            © 2026 
        </p>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
